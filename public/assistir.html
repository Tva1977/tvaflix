<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>TVAFLIX - Assistir</title>
<link rel="stylesheet" href="css/style.css">
<style>
body { background:#000; color:#fff; margin:0; font-family:Arial; }
.container { padding:40px; text-align:center; }
video { width:90%; max-width:1000px; margin-top:20px; border-radius:12px; }
.episodio { background:#111; padding:10px; margin:10px; cursor:pointer; border-radius:8px; }
.episodio:hover { background:#222; }
button { padding:10px 20px; margin-top:20px; cursor:pointer; }
</style>
</head>
<body>
<div class="container">
<h1 id="titulo"></h1>
<div id="conteudo"></div>
<br>
<button onclick="voltar()">Voltar</button>
</div>

<script>
const params = new URLSearchParams(window.location.search);
const id = params.get("id");

fetch("filmes.json")
.then(res => res.json())
.then(data => {
    const item = data.find(f => f.id == id);

    if(!item){
        document.getElementById("titulo").innerText = "Conteúdo não encontrado.";
        return;
    }

    document.getElementById("titulo").innerText = item.titulo;
    const conteudo = document.getElementById("conteudo");

    if(item.tipo === "filme"){
        conteudo.innerHTML = "<video controls autoplay src='" + item.video + "'></video>";
    }

    if(item.tipo === "serie"){
        item.temporadas.forEach(temp => {
            const tempTitulo = document.createElement("h2");
            tempTitulo.innerText = "Temporada " + temp.temporada;
            conteudo.appendChild(tempTitulo);

            temp.episodios.forEach(ep => {
                const div = document.createElement("div");
                div.className = "episodio";
                div.innerText = ep.titulo;
                div.onclick = function(){
                    conteudo.innerHTML = "<video controls autoplay src='" + ep.video + "'></video>";
                }
                conteudo.appendChild(div);
            });
        });
    }
});

function voltar(){
    window.location.href = "index.html";
}
</script>

</body>
</html>
